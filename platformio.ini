; Two firmwares in one project:
;   pio run -e sensor -t upload   -> sensor Xiao (ToF + IMU + ESP-NOW tx)
;   pio run -e base   -t upload   -> base Xiao (ESP-NOW rx + Serial bridge)
;
; Platform: pioarduino fork of espressif32 — provides Arduino-ESP32 3.x, which
; is what the Seeed XIAO ESP-NOW wiki examples are written against (uses
; WiFi.setChannel, WiFi.STA.started, and the new esp_now_recv_info callback
; signature). Standard PlatformIO espressif32 is stuck on Arduino-ESP32 2.0.x.

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

[env:sensor]
board = seeed_xiao_esp32s3
build_src_filter = +<sensor_main.cpp>
lib_deps =
    stm32duino/STM32duino VL53L3CX@^2.0.0
    https://github.com/Seeed-Studio/Grove_6Axis_Accelerometer_And_Gyroscope_BMI088.git

[env:base]
board = seeed_xiao_esp32s3
build_src_filter = +<base_main.cpp>
